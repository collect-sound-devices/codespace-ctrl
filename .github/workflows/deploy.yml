name: Deploy to Vercel

on:
  push:
    branches:
      - main
    tags:
      - 'Release-*'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history and tags

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'node'

      - name: Install dependencies
        run: npm ci

      - name: Get version from Git tags
        id: get_version
        run: |
          # Get the latest Release tag
          LATEST_TAG=$(git describe --tags --match "Release-*" --abbrev=0)
          if [ -z "$LATEST_TAG" ]; then
            echo "No Release tag found. Using default version."
            echo "VERSION=1.0.0" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "LATEST_TAG: $LATEST_TAG"
          # Extract version number from the tag (e.g., Release-1.0.1 -> 1.0.1)
          VERSION_NUMBER=$(echo "$LATEST_TAG" | sed 's/^Release-//')
          echo "VERSION_NUMBER: $VERSION_NUMBER"
          # Get the distance since the latest tag
          DISTANCE=$(git rev-list --count "$LATEST_TAG"..HEAD)
          echo "DISTANCE: $DISTANCE"
          # Append -RC<distance> if distance is greater than 0
          if [ "$DISTANCE" -gt 0 ]; then
            # Increment the third number
            VERSION_NUMBER=$(echo "$VERSION_NUMBER" | awk -F. -v OFS=. '{$3++; print}')
            # Add RC info
            DISTANCE=$(printf "%03d" "$DISTANCE")
            VERSION="$VERSION_NUMBER-RC$DISTANCE"
          else
            VERSION="$VERSION_NUMBER"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Get latest check-in time from Git
        id: get_latest_commit_date
        run: |
          # Get the latest commit date in ISO 8601 format
          LATEST_COMMIT_DATE=$(git log -1 --format=%cd --date=format:'%Y-%m-%dT%H:%M:%S%z')
          echo "LATEST_COMMIT_DATE=$LATEST_COMMIT_DATE" >> $GITHUB_OUTPUT
          echo "Latest commit date: $LATEST_COMMIT_DATE"    

      - name: Pull, build and deploy to Vercel
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_CLIENT_VERSION: ${{ steps.get_version.outputs.VERSION }}
          NEXT_PUBLIC_CLIENT_LATEST_COMMIT_DATE: ${{ steps.get_latest_commit_date.outputs.LATEST_COMMIT_DATE }}
        run: |
          set -euo pipefail
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"

          npm install -g vercel@latest
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: $DEPLOYMENT_URL"
          vercel alias set "$DEPLOYMENT_URL" codespace-ctrl.vercel.app --token=$VERCEL_TOKEN

      - name: Verify Vercel deployment responds
        env:
          DEPLOYMENT_URL: ${{ steps.vercel_deploy.outputs.DEPLOYMENT_URL }}
        run: |
          set -euo pipefail

          for attempt in {1..12}; do
            STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" "$DEPLOYMENT_URL")
            echo "Attempt $attempt: $DEPLOYMENT_URL returned $STATUS"

            if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
              exit 0
            fi

            sleep 5
          done

          echo "Vercel deployment did not return HTTP 200 or protected HTTP 401."
          exit 1

      - name: Verify production alias responds
        env:
          PRODUCTION_URL: https://codespace-ctrl.vercel.app
        run: |
          set -euo pipefail

          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" "$PRODUCTION_URL")
          echo "$PRODUCTION_URL returned $STATUS"

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
            exit 0
          fi

          echo "Production alias did not return HTTP 200 or protected HTTP 401."
          exit 1

      - name: Create or update Release
        run: |
          VERS=${{ steps.get_version.outputs.VERSION }}
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          if gh release view "$VERS" > /dev/null 2>&1; then
            echo "Release $VERS already exists, updating..."
            gh release edit "$VERS" --title "Codespace Control $VERS" --notes "Release of Codespace Control $VERS"
          else
            echo "Creating new release $VERS..."
            gh release create "$VERS" --title "Codespace Control $VERS" --notes "Release of Codespace Control $VERS"
          fi
